<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ - L'AMAS ZONE</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/chatbot.js"></script>
</head>
<body class="contact-page">

<header id="main-header">
    <div class="header-left">
        <a href="page_accueil.html">
            <img src="../images/logo.png" alt="Logo L'AMAS ZONE" class="main-logo">
        </a>
    </div>

    <div class="header-right">
        <a href="faq.html" class="delivery-location" style="text-decoration: none; color: inherit; margin-right: 15px;">
            <img src="../images/faq.png" alt="" class="icon" width="20px" style="filter: invert(0.5);">
            <span>FAQ</span>
        </a>
        <a href="contact.html" class="contact-btn">Nous contacter</a>
        <img src="../images/efreiLogo.png" alt="Logo EFREI" class="school-logo">
    </div>
</header>

<nav id="sub-nav">
    <button id="menu-toggle">☰ Tout voir</button>
    <div class="nav-scroll-container">
        <ul class="nav-categories">
            <li><a href="#">Immobilier</a></li>
            <li><a href="#">Décoration</a></li>
            <li><a href="#">Mode</a></li>
            <li><a href="#">Sport</a></li>
            <li><a href="#">Bricolage</a></li>
            <li><a href="#">High-Tech</a></li>
        </ul>
    </div>
</nav>

<main id="contact-content">
    <section class="about-section" style="max-width: 600px; width: 100%;">
        <h1 class="main-title" style="text-align: center;">Assistant FAQ</h1>
        <div id="chat-window" style="background: #f0f0f2; border-radius: 12px; padding: 20px; height: 400px; display: flex; flex-direction: column;">
            <div id="chat-content" style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;">
                <div class="chat-message bot">Bonjour ! Une question sur nos objets cassés ?</div>
            </div>
            <div id="question-list" style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; border-top: 1px solid #ccc; padding-top: 10px;"></div>
        </div>
    </section>
</main>

<footer id="main-footer">
    <div class="footer-container">
        <nav class="footer-nav">
            <a href="a_propos.html" class="footer-link">À propos de nous</a>
        </nav>
        <div class="social-links">
            <a href="https://twitter.com"><img src="../images/twitter.png" alt="X"></a>
            <a href="https://instagram.com"><img src="../images/instagram.png" alt="Instagram"></a>
            <a href="https://youtube.com"><img src="../images/youtube.png" alt="YouTube"></a>
            <a href="https://linkedin.com"><img src="../images/linkedin.png" alt="LinkedIn"></a>
        </div>
    </div>
</footer>
</body>
</html>
