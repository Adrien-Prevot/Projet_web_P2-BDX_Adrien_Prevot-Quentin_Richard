<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - L'AMAS ZONE</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="contact-page">

<header id="main-header">
    <div class="header-left">
        <a href="page_accueil.html">
            <img src="../images/logo.png" alt="Logo L'AMAS ZONE" class="main-logo">
        </a>
    </div>

    <div class="header-right">
        <a href="faq.html" class="faq-btn" id="faq-link">
            <img src="../images/faq.png" alt="" class="icon" id="faq-icon">
            <span>FAQ</span>
        </a>
        <a href="page_accueil.html" class="contact-btn">Retour Accueil</a>
        <img src="../images/efreiLogo.png" alt="Logo EFREI" class="school-logo">
    </div>
</header>

<nav id="sub-nav">
    <button id="menu-toggle">☰ Tout voir</button>
    <div class="nav-scroll-container">
        <ul class="nav-categories">
            <li><a href="page_accueil.html?category=Immobilier">Immobilier</a></li>
            <li><a href="page_accueil.html?category=Décoration">Décoration</a></li>
            <li><a href="page_accueil.html?category=Mode">Mode</a></li>
            <li><a href="page_accueil.html?category=Sport">Sport</a></li>
            <li><a href="page_accueil.html?category=Livre">Livre</a></li>
            <li><a href="page_accueil.html?category=High-Tech">High-Tech</a></li>
        </ul>
    </div>
</nav>

<main id="contact-content">
    <div class="back-button-container">
        <a href="page_accueil.html" class="contact-btn">← Retour à l'accueil</a>
    </div>
    <section class="contact-section">
        <h1 class="main-title">Contactez-nous</h1>
        <div class="form-container">
            <form action="#" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="name">Nom</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Envoyer</button>
            </form>
        </div>
    </section>
</main>

<footer id="main-footer">
    <div class="footer-container">
        <nav class="footer-nav">
            <a href="a_propos.html" class="footer-link">À propos de nous</a>
        </nav>
        <div class="social-links">
            <a href="https://twitter.com"><img src="../images/twitter.png" alt="X"></a>
            <a href="https://instagram.com"><img src="../images/instagram.png" alt="Instagram"></a>
            <a href="https://youtube.com"><img src="../images/youtube.png" alt="YouTube"></a>
            <a href="https://linkedin.com"><img src="../images/linkedin.png" alt="LinkedIn"></a>
        </div>
    </div>
</footer>

<script src="../js/script.js"></script>
</body>
</html>
