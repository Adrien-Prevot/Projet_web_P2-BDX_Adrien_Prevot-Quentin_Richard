<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <!-- pour bien s'afficher sur téléphone -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - L'AMAS ZONE</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="pageContact">

<header id="entetePrincipal">
    <div class="enteteGauche">
        <!-- Logo cliquable pour revenir a l'accueil -->
        <a href="page_accueil.html">
            <img src="../images/logo.png" alt="Logo L'AMAS ZONE" class="logoPrincipal">
        </a>
    </div>

    <div class="enteteDroite">
        <a href="faq.html" class="boutonFaq" id="lienFaq">
            <img src="../images/faq.png" alt="" class="icone" id="iconeFaq">
            <span>FAQ</span>
        </a>
        <a href="page_accueil.html" class="boutonContact">Retour Accueil</a>
        <img src="../images/efreiLogo.png" alt="Logo EFREI" class="logoEcole">
    </div>
</header>

<nav id="sousNavigation">
    <button id="boutonMenu">☰ Tout voir</button>
    <div class="conteneurNavigation">
        <!-- Liste des catégories clickable pour affiner les recherhces-->
        <ul class="categoriesNavigation">
            <li><a href="page_accueil.html?category=Immobilier">Immobilier</a></li>
            <li><a href="page_accueil.html?category=Décoration">Décoration</a></li>
            <li><a href="page_accueil.html?category=Mode">Mode</a></li>
            <li><a href="page_accueil.html?category=Sport">Sport</a></li>
            <li><a href="page_accueil.html?category=Livre">Livre</a></li>
            <li><a href="page_accueil.html?category=High-Tech">High-Tech</a></li>
        </ul>
    </div>
</nav>

<main id="contenuContact">
    <div class="conteneurBoutonRetour">
        <a href="page_accueil.html" class="boutonContact">← Retour à l'accueil</a>
    </div>
    <section class="sectionContact">
        <h1 class="titrePrincipal">Contactez-nous</h1>
        <div class="conteneurFormulaire">
            <form action="#" method="POST" class="formulaireContact">
                <div class="groupeFormulaire">
                    <label for="name">Nom</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="groupeFormulaire">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="groupeFormulaire">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" required></textarea>
                </div>
                <button type="submit" class="boutonSoumettre">Envoyer</button>
            </form>
        </div>
    </section>
</main>

<footer id="piedDePage">
    <div class="conteneurPiedDePage">
        <nav class="navigationPiedDePage">
            <a href="a_propos.html" class="lienPiedDePage">À propos de nous</a>
        </nav>
        <div class="liensSociaux">
            <a href="https://twitter.com"><img src="../images/twitter.png" alt="X"></a>
            <a href="https://instagram.com"><img src="../images/instagram.png" alt="Instagram"></a>
            <a href="https://youtube.com"><img src="../images/youtube.png" alt="YouTube"></a>
            <a href="https://linkedin.com"><img src="../images/linkedin.png" alt="LinkedIn"></a>
        </div>
    </div>
</footer>
<!-- pour pouvoir cliquer sur les bouton du haut de la page pour choisir les catégoris -->
<script src="../js/script.js"></script>
</body>
</html>
