<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - L'AMAS ZONE</title>
</head>
<body>

<header>
    <a href="page_accueil.html">
        <img src="../images/logo.png" alt="Logo L'AMAS ZONE" width="300">
    </a>

    <img src="../images/efreiLogo.png" alt="Logo EFREI" width="150">
</header>

<main>
    <section>
        <h1>contactez-nous</h1>
        <p>Vos coordonnées</p>

        <form action="#" method="POST">
            <div>
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Value">
            </div>

            <div>
                <label for="surname">Surname</label>
                <input type="text" id="surname" name="surname" placeholder="Value">
            </div>

            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Value">
            </div>

            <div>
                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Value"></textarea>
            </div>

            <button type="submit">Submit</button>
        </form>
    </section>
</main>

</body>
</html>
