<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - L'AMAS ZONE</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="contact-page">

<header id="main-header">
    <div class="header-left">
        <a href="page_accueil.html">
            <img src="../images/logo.png" alt="Logo L'AMAS ZONE" class="main-logo">
        </a>
    </div>

    <div class="header-right">
        <img src="../images/efreiLogo.png" alt="Logo EFREI" class="school-logo">
    </div>
</header>

<main id="contact-content">
    <section class="contact-section">
        <h1 class="main-title">Contactez-nous</h1>
        <p class="subtitle">Vos coordonnées</p>

        <div class="form-container">
            <form action="#" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="name">Nom</label>
                    <input type="text" id="name" name="name" placeholder="Nom" required>
                </div>

                <div class="form-group">
                    <label for="surname">Prénom</label>
                    <input type="text" id="surname" name="surname" placeholder="Prénom" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Email" required>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Message" required></textarea>
                </div>

                <button type="submit" class="submit-btn">Envoyer</button>
            </form>
        </div>
    </section>
</main>

<script src="script.js"></script>
</body>
</html>
